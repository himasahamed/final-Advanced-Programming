<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reports - Reservations</title>

    <style>
        :root{
            --bg1:#0f172a; --bg2:#111827;
            --card: rgba(255,255,255,.07);
            --border: rgba(255,255,255,.14);
            --text: rgba(255,255,255,.92);
            --muted: rgba(255,255,255,.68);
            --accent:#3b82f6; --accent2:#22c55e;
            --shadow: 0 18px 40px rgba(0,0,0,.45);
            --radius: 18px;
        }
        *{box-sizing:border-box;}
        body{
            margin:0; min-height:100vh; padding:24px;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            color:var(--text);
            display:flex; align-items:center; justify-content:center;
            background:
                    radial-gradient(900px 500px at 15% 20%, rgba(59,130,246,.35), transparent 55%),
                    radial-gradient(700px 420px at 85% 25%, rgba(34,197,94,.25), transparent 60%),
                    radial-gradient(900px 600px at 50% 90%, rgba(168,85,247,.18), transparent 60%),
                    linear-gradient(135deg, var(--bg1), var(--bg2));
        }
        .wrap{ width:min(980px, 100%); display:grid; gap:16px; }

        .topbar{
            display:flex; align-items:center; justify-content:space-between; gap:12px;
            padding:14px 16px;
            border:1px solid var(--border);
            background: rgba(255,255,255,.06);
            backdrop-filter: blur(10px);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }
        .brand{ display:flex; align-items:center; gap:10px; font-weight:800; }
        .logo{
            width:38px;height:38px;border-radius:12px;
            background: linear-gradient(135deg, rgba(59,130,246,.95), rgba(34,197,94,.85));
            box-shadow: 0 10px 22px rgba(59,130,246,.25);
        }
        .subtitle{ font-size:13px; color:var(--muted); margin-top:2px; }

        .nav a{
            color:var(--text);
            text-decoration:none;
            padding:10px 12px;
            border-radius:12px;
            border:1px solid transparent;
            background: rgba(255,255,255,.05);
            transition: .2s ease;
            font-size:14px;
            white-space:nowrap;
        }
        .nav a:hover{
            border-color: rgba(59,130,246,.45);
            background: rgba(59,130,246,.12);
            transform: translateY(-1px);
        }

        .card{
            border:1px solid var(--border);
            background: var(--card);
            backdrop-filter: blur(10px);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 18px;
        }

        h2{ margin:0 0 6px 0; font-size:22px; }
        .hint{ margin:0 0 12px 0; color:var(--muted); font-size:14px; line-height:1.4; }

        .btn{
            display:inline-flex; align-items:center; justify-content:center;
            padding:12px 14px; border-radius:14px;
            font-weight:800; font-size:14px;
            border:none; cursor:pointer;
            color:white;
            background: linear-gradient(135deg, rgba(59,130,246,.95), rgba(34,197,94,.85));
            box-shadow: 0 14px 28px rgba(59,130,246,.22);
            text-decoration:none;
            min-width: 180px;
        }
        .btn:hover{ transform: translateY(-1px); filter: brightness(1.02); }

        @media (max-width: 820px){
            .topbar{ flex-direction:column; align-items:flex-start; }
            .nav{ width:100%; display:flex; gap:10px; flex-wrap:wrap; }
            .btn{ width:100%; }
        }
    </style>
</head>

<body>
<div class="wrap">

    <div class="topbar">
        <div class="brand">
            <div class="logo"></div>
            <div>
                <div>Room Reservation System</div>
                <div class="subtitle">Reports</div>
            </div>
        </div>

        <div class="nav">
            <a href="home">Home</a>
            <a href="addReservation.html">Add</a>
            <a href="viewReservation.html">View</a>
            <a href="bill.html">Bill</a>
            <a href="help.html">Help</a>
        </div>
    </div>

    <div class="card">
        <h2>Reservations Report</h2>
        <p class="hint">Click below to view all reservations stored in the database.</p>

        <a class="btn" href="reports">View Report</a>
    </div>

</div>
</body>
</html>
